<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Leaf shape behind -->
  <g transform="translate(256,220)" filter="url(#shadow)">
    <path d="M-20,-120 C60,-120 120,-60 120,20 C120,60 100,95 70,110 L60,90 C80,75 90,50 90,20 C90,-40 45,-85 -20,-90 Z" fill="url(#leaf)" opacity="0.6"/>
    <path d="M20,-120 C-60,-120 -120,-60 -120,20 C-120,60 -100,95 -70,110 L-60,90 C-80,75 -90,50 -90,20 C-90,-40 -45,-85 20,-90 Z" fill="url(#leaf)" opacity="0.5"/>
    <!-- Center leaf vein -->
    <line x1="0" y1="-100" x2="0" y2="110" stroke="#E8F5E9" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- Dollar sign / book icon -->
  <g transform="translate(256,240)" filter="url(#shadow)">
    <!-- Open book shape -->
    <path d="M-60,30 C-60,-10 -40,-30 0,-40 C40,-30 60,-10 60,30 L40,30 C40,0 25,-10 0,-18 C-25,-10 -40,0 -40,30 Z" fill="white" opacity="0.9"/>
    <!-- Dollar sign -->
    <text x="0" y="5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="100" font-weight="800" fill="url(#gold)">$</text>
  </g>
  <!-- "GF" text at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="800" fill="rgba(255,255,255,0.9)" letter-spacing="6">BOOKS</text>
</svg>
